<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Component Image Slider</title>
</head>
<body>
  <div class="c-slider">
    <div class="c-slider__wrapper">
      <ul class="c-slider__slides">
        <li class="c-slider__slide">
          <img class="c-slider__image" id="slide-1" src="/src/assets/images/wald.jpg" alt="Wald">
        </li>
        <li class="c-slider__slide">
          <img class="c-slider__image" id="slide-2" src="/src/assets/images/teetasse.jpg" alt="Teetasse">
        </li>
        <li class="c-slider__slide">
          <img class="c-slider__image" id="slide-3" src="/src/assets/images/see.jpg" alt="See">
        </li>
        <li class="c-slider__slide">
          <img class="c-slider__image" id="slide-4" src="/src/assets/images/kürbis.jpg" alt="Kürbis">
        </li>
        <li class="c-slider__slide">
          <img class="c-slider__image" id="slide-5" src="/src/assets/images/igel.jpg" alt="Igel">
        </li>
      </ul>
      <nav class="c-slider__nav">
        <a class="c-slider__button" href="#slide-1"></a>
        <a class="c-slider__button" href="#slide-2"></a>
        <a class="c-slider__button" href="#slide-3"></a>
        <a class="c-slider__button" href="#slide-4"></a>
        <a class="c-slider__button" href="#slide-5"></a>
      </nav>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
