<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Component: Card grid</title>
</head>
<body>
  <div class="o-grid">
    <div class="o-grid__item">
      <div class="c-card">
        <img class="c-card__image" src="/src/assets/images/city.jpg" alt="city">
        <div class="c-card__content">
          <h2 class="c-card__title">International Artist Feature: Malaysia</h2>
          <span class="c-card__author">Mary Winkler</span>
        </div>
      </div>
    </div>
    <div class="o-grid__item">
      <div class="c-card">
        <img class="c-card__image" src="/src/assets/images/people.jpg" alt="people">
        <div class="c-card__content">
          <h2 class="c-card__title">How to Conduct Remote Usability Testing</h2>
          <span class="c-card__author">Harry Brignull</span>
        </div>
      </div>
    </div>
    <div class="o-grid__item">
      <div class="c-card">
        <img class="c-card__image" src="/src/assets/images/woman.jpg" alt="woman">
        <div class="c-card__content">
          <h2 class="c-card__title">Created by You, July Edition</h2>
          <p class="c-card__text">
            Welcome to our monthly feature of fantastic tutorial results created by you,
            the Envato Tuts+ community!
          </p>
          <span class="c-card__author">Melody Nieves</span>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
